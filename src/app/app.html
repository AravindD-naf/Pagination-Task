<div class="container" style="max-width: 720px; margin: 2rem auto;">
  <h2>DummyJSON Products</h2>

  <div *ngIf="loading">Loading…</div>
  <div *ngIf="error" class="error" style="color:#b00020">{{ error }}</div>

  <ul *ngIf="!loading && !error" style="list-style: none; padding: 0;">
    <li *ngFor="let p of products" style="padding: .5rem 0; border-bottom: 1px solid #eee;">
      <strong>{{ p.title }}</strong>
      <span style="opacity:.7"> — ₹{{ p.price }}</span>
    </li>
  </ul>

  <pagination-controls
    [responsive]="true"
    (pageChange)="onPageChange($event)">
  </pagination-controls>


<div class="meta" *ngIf="!loading && total">
  Page {{ page }} of {{ totalPages }} • Total {{ total }} items
</div>

</div>
